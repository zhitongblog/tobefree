<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDF9F2"/>
      <stop offset="1" stop-color="#F4EAD9"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#35b57e"/>
      <stop offset="1" stop-color="#1c8457"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="8" fill="#D96C3F"/>

  <!-- faint oversized dove on the right -->
  <g opacity="0.08" transform="translate(760,120) scale(9)">
    <path d="M16 40c8 2 15-1 20-8 2-3 5-6 9-6-2 4-2 7-5 10-5 6-14 9-24 8-1 0-1-3 0-4z" fill="#1c8457"/>
    <path d="M34 25c3-4 8-6 13-5-2 2-2 4-5 6-3 2-6 2-8 1z" fill="#1c8457"/>
  </g>

  <!-- logo -->
  <g transform="translate(110,150)">
    <rect width="112" height="112" rx="26" fill="url(#logo)"/>
    <g transform="translate(20,20) scale(1.15)">
      <path d="M16 40c8 2 15-1 20-8 2-3 5-6 9-6-2 4-2 7-5 10-5 6-14 9-24 8-1 0-1-3 0-4z" fill="#fff"/>
      <path d="M34 25c3-4 8-6 13-5-2 2-2 4-5 6-3 2-6 2-8 1z" fill="#fff" opacity="0.9"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="250" y="248" font-family="Georgia, 'Songti SC', 'Noto Serif SC', serif" font-size="96" font-weight="700" fill="#2B2119">To Be Free</text>

  <!-- tagline -->
  <text x="254" y="322" font-family="'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif" font-size="44" fill="#6E5F51">让每个人都能自由使用软件</text>

  <!-- promise -->
  <text x="254" y="386" font-family="'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif" font-size="32" font-weight="600" fill="#B0481F">真正免费 · 无广告 · 无追踪 · 无负担</text>

  <!-- badge pills -->
  <g font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="28" fill="#6E5F51">
    <rect x="110" y="470" width="128" height="60" rx="30" fill="#FFFDF9" stroke="#E4D6C0"/>
    <text x="174" y="509" text-anchor="middle">开源</text>
    <rect x="252" y="470" width="150" height="60" rx="30" fill="#FFFDF9" stroke="#E4D6C0"/>
    <text x="327" y="509" text-anchor="middle">无广告</text>
    <rect x="416" y="470" width="150" height="60" rx="30" fill="#FFFDF9" stroke="#E4D6C0"/>
    <text x="491" y="509" text-anchor="middle">无追踪</text>
    <rect x="580" y="470" width="182" height="60" rx="30" fill="#FFFDF9" stroke="#E4D6C0"/>
    <text x="671" y="509" text-anchor="middle">离线可用</text>
  </g>

  <text x="1090" y="560" text-anchor="end" font-family="'Microsoft YaHei',sans-serif" font-size="30" fill="#9C8B7A">tobefree.app</text>
</svg>
