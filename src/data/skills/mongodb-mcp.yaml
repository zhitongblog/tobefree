  zh: MongoDB 官方开源的 MCP 服务器，让模型连接本地 MongoDB 或 Atlas 集群，运行查询、聚合、管理集合与索引，并操作 Atlas 资源。本地以 npx 运行，需提供连接字符串或 Atlas 凭据。
