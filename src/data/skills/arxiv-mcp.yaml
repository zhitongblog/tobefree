description:
  zh: 一个 MCP 服务器，让 Agent 按关键词、日期和分类搜索 arXiv 论文，下载全文并本地缓存后逐篇研读，适合做文献调研与科研辅助。直接查询 arXiv 公共接口，无需 API Key。
