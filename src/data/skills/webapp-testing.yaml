description:
  zh: >-
    Anthropic 官方开源（Apache-2.0）技能，为 Claude 提供一套用 Playwright 操作和测试本地 Web
    应用的工具箱：验证前端功能、调试 UI 行为、抓取浏览器截图、查看浏览器日志，适合自查刚写好的页面。
  en: >-
    An official open-source (Apache-2.0) skill giving Claude a Playwright-based
    toolkit to drive and test local web apps: verify frontend functionality, debug
    UI behavior, capture browser screenshots, and inspect browser logs — ideal for
    dogfooding a page you just built.
