  zh: E2B 官方开源的 MCP 服务器，让模型在 E2B 云端沙箱里安全地运行代码。沙箱基于 Firecracker 微虚拟机做硬件级隔离，适合让 Agent 执行不受信任的代码。需要 E2B API Key。
