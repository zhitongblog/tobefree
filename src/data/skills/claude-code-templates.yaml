description:
  zh: >-
    Daniel Avila 开源（MIT）的 Claude Code 组件库与 CLI，收录 900+ 现成组件——AI Agent、自定义命令、
    设置、hooks、MCP 集成与项目模板，一条 npx 命令即可安装，还内置本地分析看板监控用量。
