  en: >-
    Daniel Avila's open-source (MIT) component library and CLI for Claude Code, hosting
    900+ ready-to-use components — AI agents, custom commands, settings, hooks, MCP
    integrations and project templates — installable in one npx command, with a built-in
    local analytics dashboard for usage. The companion site aitmpl.com lets you browse
    everything visually. Often called the "package manager" for the Claude Code ecosystem.
    28k+ GitHub stars.
