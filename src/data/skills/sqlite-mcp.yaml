description:
  zh: MCP 官方的参考服务器，让模型直接对一个本地 SQLite 文件执行 SQL 查询、建表、写入并汇总数据洞察。纯本地、无需账号，是给 Agent 接数据库最轻量的起点。项目现已归档但仍开源可用。
  en: An official MCP reference server that lets the model run SQL, create tables, write rows and summarize insights against a local SQLite file. Fully local with no account — the lightest way to give an agent a database. The project is now archived but remains open source and usable.
