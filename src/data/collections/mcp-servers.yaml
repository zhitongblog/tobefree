title:
  zh: MCP Server 推荐
  en: Recommended MCP Servers
description:
  zh: 免费开源 MCP Server 推荐，覆盖文件系统、Git、数据库、浏览器、搜索、文档、云服务和开发工作流。
  en: Recommended free and open-source MCP servers for filesystems, Git, databases, browsers, search, documents, cloud services and developer workflows.
intro:
  zh: MCP Server 能把本地文件、数据库、浏览器、API 和开发工具接入 AI Agent。这个专题优先收录免费开源、用途明确、适合真实工作流的 MCP 项目。
  en: MCP servers connect files, databases, browsers, APIs and developer tools to AI agents. This collection focuses on free, open-source MCP projects with clear practical use cases.
criteria:
  zh:
    - 免费或开源，安装方式清楚。
    - 能接入真实工作流，而不是只做演示。
    - 优先常见客户端兼容、维护活跃、风险边界清楚的项目。
  en:
    - Free or open source with clear installation paths.
    - Useful in real workflows, not just demos.
    - Common client compatibility, active maintenance and clear risk boundaries are preferred.
tools: [unterm]
skills: [filesystem-mcp, git-mcp, sqlite-mcp, postgres-mcp-pro, fetch-mcp, brave-search-mcp, context7, github-mcp, docker-mcp, cloudflare-mcp, obsidian-mcp, playwright-mcp, chrome-devtools-mcp, youtube-transcript-mcp, unterm-mcp]
faq:
  zh:
    - q: MCP Server 适合谁？
      a: 适合想让 AI Agent 读取文件、跑工具、查数据库、连服务或自动化开发流程的人。
    - q: 安装 MCP Server 有风险吗？
      a: 有。要看它能访问哪些文件、账号和网络资源。优先用开源项目，按最小权限配置。
  en:
    - q: Who should use MCP servers?
      a: They are useful when you want AI agents to read files, run tools, query databases, connect services or automate development workflows.
    - q: Are MCP servers risky?
      a: They can be. Review what files, accounts and network resources they can access. Prefer open-source projects and least-privilege configuration.
featured: true
added: '2026-07-20'
