title:
  zh: 免费密码管理器推荐
  en: Free Password Managers
description:
  zh: 免费密码管理、加密和账号安全工具，适合个人、家庭和重视隐私的用户。
  en: Free password managers, encryption and account security tools for individuals, families and privacy-conscious users.
intro:
  zh: 密码管理器是最值得优先安装的安全工具之一。这个专题优先收录免费可用、跨平台或本地优先、维护成熟的密码与加密工具。
  en: A password manager is one of the first security tools worth installing. This collection focuses on free, mature and privacy-conscious password and encryption tools.
criteria:
  zh:
    - 免费版可满足个人日常密码管理。
    - 支持强密码、自动填充、跨设备或本地数据库。
    - 优先开源、可导出、长期维护的工具。
  en:
    - Free plans are practical for everyday personal password management.
    - Strong passwords, autofill, cross-device sync or local vaults are supported.
    - Open-source, exportable and well-maintained tools are preferred.
tools: [bitwarden, keepassxc, cryptomator, veracrypt]
skills: []
faq:
  zh:
    - q: Bitwarden 和 KeePassXC 怎么选？
      a: 想要跨设备同步和浏览器自动填充，Bitwarden 更省心；想要本地数据库和完全掌控文件，KeePassXC 更合适。
    - q: 密码管理器安全吗？
      a: 比重复使用弱密码安全得多。关键是设置强主密码、开启双重验证，并从官方渠道安装。
  en:
    - q: Should I choose Bitwarden or KeePassXC?
      a: Bitwarden is easier for sync and browser autofill. KeePassXC is better if you want a local vault file under your control.
    - q: Are password managers safe?
      a: They are much safer than reusing weak passwords. Use a strong master password, enable two-factor authentication and install from official sources.
featured: false
added: '2026-07-20'
