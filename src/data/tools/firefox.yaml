description:
  zh: Mozilla 出品的开源浏览器，默认拦截数千种追踪器，隐私窗口关闭即清空记录。同步数据端到端加密，不出售用户信息，是主流浏览器里少有的以用户为先的选择。
  en: Mozilla's open-source browser blocks thousands of trackers by default, and Private Windows wipe everything on close. Synced data is end-to-end encrypted, your information is never sold — a rare user-first choice among mainstream browsers.
