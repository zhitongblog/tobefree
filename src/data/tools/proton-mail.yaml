description:
  zh: 世界最大的端到端加密邮件服务，邮件在离开设备前就加密，Proton 自己也读不到内容。位于瑞士、受严格隐私法保护，客户端开源、经独立审计。免费版即可拥有一个私密邮箱。
  en: The world's largest end-to-end encrypted email service — mail is encrypted before it leaves your device, so not even Proton can read it. Based in Switzerland under strict privacy law, with open-source, independently audited clients. The free tier gives you a private mailbox.
